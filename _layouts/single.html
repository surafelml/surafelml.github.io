---
layout: default
---
<div class="post-wrap">
  <aside class="post-toc" id="post-toc">
    <nav>
      <p class="toc-label">Contents</p>
      <ul id="toc-list"></ul>
    </nav>
  </aside>
  <article class="post-content">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% if page.tags.size > 0 %}
        &middot;
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      {% endif %}
    </p>
    <div class="post-body">{{ content }}</div>
    <p class="post-back"><a href="/blog/">&larr; All posts</a></p>
  </article>
</div>

<script>
(function() {
  var headings = document.querySelectorAll('.post-body h2, .post-body h3');
  var toc = document.getElementById('toc-list');
  if (!toc || headings.length < 2) {
    var aside = document.getElementById('post-toc');
    if (aside) aside.style.display = 'none';
    return;
  }
  var hs = Array.from(headings);
  hs.forEach(function(h, i) {
    if (!h.id) h.id = 'h-' + i;
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') li.classList.add('toc-sub');
    li.appendChild(a);
    toc.appendChild(li);
  });

  function setActive() {
    var scrollY = window.scrollY + 90;
    var current = hs[0];
    hs.forEach(function(h) { if (h.offsetTop <= scrollY) current = h; });
    toc.querySelectorAll('a').forEach(function(a) {
      a.classList.toggle('toc-active', a.getAttribute('href') === '#' + current.id);
    });
  }
  window.addEventListener('scroll', setActive, { passive: true });
  setActive();
})();
</script>
